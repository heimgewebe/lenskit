name: one-shot-pytest-diagnostics

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  capture:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/repoground-open-source-name-stewardship-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt
      - name: Run and retain full pytest output
        id: pytest
        run: |
          set +e
          pytest -q -m "not browser and not doc_freshness_live" > pytest-full.log 2>&1
          status=$?
          set -e
          cat pytest-full.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload complete pytest log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pytest-full-${{ github.run_id }}
          path: pytest-full.log
          if-no-files-found: error
          retention-days: 7
      - name: Propagate pytest result
        if: steps.pytest.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.pytest.outputs.exit_code }}
        run: exit "$EXIT_CODE"
