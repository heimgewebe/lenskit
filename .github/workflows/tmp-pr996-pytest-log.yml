name: temporary-pr996-pytest-log

on: [push, pull_request]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repobrief-dev.lock.txt
      - name: Capture full pytest output
        shell: bash
        run: |
          set +e
          pytest -q -m "not browser and not doc_freshness_live" > pytest.log 2>&1
          status=$?
          echo "$status" > pytest.exit
          exit 0
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: pr996-pytest-${{ github.sha }}
          path: |
            pytest.log
            pytest.exit
          if-no-files-found: error
          retention-days: 2
