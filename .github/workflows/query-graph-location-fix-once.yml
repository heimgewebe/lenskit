---
name: Query Graph Location Fix Once

"on":
  push:
    branches:
      - fix/graph-provenance-coherence
    paths:
      - ".github/workflows/query-graph-location-fix-once.yml"
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/graph-provenance-coherence
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bind Graph Index to index directory
        run: |
          python - <<'PY'
          from pathlib import Path

          file = Path("merger/lenskit/retrieval/query_core.py")
          lines = file.read_text(encoding="utf-8").splitlines(keepends=True)
          starts = [
              index
              for index in range(len(lines) - 1)
              if lines[index].strip() == "if graph_index_path:"
              and "graph_index_path.exists" in lines[index + 1]
          ]
          if len(starts) != 1:
              raise SystemExit(f"expected one loader start, found {len(starts)}")
          start = starts[0]
          end = next(
              index
              for index in range(start + 1, len(lines))
              if lines[index].strip() == "if not graph_weights:"
          )
          replacement = [
              "        if graph_index_path:\n",
              "            graph_root = index_path.resolve().parent\n",
              "            graph_resolved = graph_index_path.resolve()\n",
              "            if graph_resolved.parent != graph_root:\n",
              "                raise RuntimeError(\n",
              "                    \"Graph Index and SQLite index must share one directory\"\n",
              "                )\n",
              "            res = load_graph_index(\n",
              "                graph_root,\n",
              "                graph_resolved.name,\n",
              "                expected_sha256=expected_sha256,\n",
              "            )\n",
              "            graph_status = res[\"status\"]\n",
              "            if graph_status == \"ok\":\n",
              "                graph_index = res[\"graph\"]\n",
              "            else:\n",
              "                graph_index = None\n",
              "\n",
          ]
          lines[start:end] = replacement
          file.write_text("".join(lines), encoding="utf-8")
          PY

      - name: Install dependencies
        run: |
          pip install -r merger/lenskit/requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify
        run: |
          python -m pytest -q \
            merger/lenskit/tests/test_graph_index.py \
            merger/lenskit/tests/test_graph_rerank.py \
            merger/lenskit/tests/test_graph_e2e.py \
            merger/lenskit/tests/test_retrieval_query.py
          ruff check \
            merger/lenskit/architecture/graph_index.py \
            merger/lenskit/retrieval/query_core.py \
            merger/lenskit/tests/test_graph_index.py
          git diff --check

      - name: Commit verified query boundary
        run: |
          set -euo pipefail
          git config user.name "lenskit-g2-finalizer"
          git config user.email "lenskit-g2-finalizer@users.noreply.github.com"
          git add merger/lenskit/retrieval/query_core.py
          git commit -m "fix(graph): bind retrieval graph to index directory"
          git push origin HEAD:fix/graph-provenance-coherence
