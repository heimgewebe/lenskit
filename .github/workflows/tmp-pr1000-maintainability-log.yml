name: temporary PR 1000 taskset correction

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  correct-taskset:
    if: github.head_ref == 'feat/repobrief-agent-benchmark-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Remove exactly one redundant frozen case
        shell: bash
        run: |
          python - <<'PY'
          import collections
          import json
          from pathlib import Path

          source = Path("docs/retrieval/repobrief_agent_benchmark_taskset.v1.json")
          document = json.loads(source.read_text(encoding="utf-8"))
          remove_id = "struct-grabowski-runtime-contract"
          matches = [case for case in document["cases"] if case["id"] == remove_id]
          if not matches:
              raise SystemExit(0)
          if len(matches) != 1:
              raise SystemExit(f"expected one {remove_id}, got {len(matches)}")
          document["cases"] = [case for case in document["cases"] if case["id"] != remove_id]
          counts = collections.Counter(case["category"] for case in document["cases"])
          expected = {"navigation": 8, "structural": 8, "grounding_freshness": 8}
          if len(document["cases"]) != 24 or counts != expected:
              raise SystemExit(
                  f"invalid corrected taskset: cases={len(document['cases'])}, counts={dict(counts)}"
              )
          source.write_text(
              json.dumps(document, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Commit corrected taskset when changed
        shell: bash
        run: |
          if git diff --quiet -- docs/retrieval/repobrief_agent_benchmark_taskset.v1.json; then
            echo "taskset already corrected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/retrieval/repobrief_agent_benchmark_taskset.v1.json
          git commit -m "fix(repobrief): keep benchmark taskset at 24 cases"
          git push origin HEAD:${{ github.head_ref }}
