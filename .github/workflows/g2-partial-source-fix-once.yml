---
name: G2 Partial Source Fix Once

"on":
  push:
    branches:
      - fix/graph-provenance-coherence
    paths:
      - ".github/workflows/g2-partial-source-fix-once.yml"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/graph-provenance-coherence
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply partial-source fix
        run: python3 scripts/patch_graph_partial_sources_once.py

      - name: Install dependencies
        run: |
          pip install -r merger/lenskit/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run focused bundle tests
        run: |
          python -m pytest -q \
            merger/lenskit/tests/test_graph_bundle_integration.py \
            merger/lenskit/tests/test_graph_index.py \
            merger/lenskit/tests/test_graph_bundle_manifest_provenance.py

      - name: Ruff and diff check
        run: |
          ruff check merger/lenskit/tests/test_graph_bundle_integration.py
          git diff --check

      - name: Remove one-time script
        run: rm scripts/patch_graph_partial_sources_once.py

      - name: Commit verified patch
        run: |
          set -euo pipefail
          git config user.name "lenskit-g2-finalizer"
          git config user.email "lenskit-g2-finalizer@users.noreply.github.com"
          git add -A
          git commit -m "fix(graph): reject partial bundle source pairs"
          git push origin HEAD:fix/graph-provenance-coherence
