name: T006 module helper refactor

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refactor-test-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact T006 branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: fix/repoground-runtime-contracts-t006
          fetch-depth: 0

      - name: Verify exact unrefactored product file
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor b40b307529762c81213d207bc7ced375686ae2b8 HEAD
          test "$(git hash-object merger/repoground/core/merge.py)" = "49cc1af498a75537009fce8c4ff7f4e7c2c61d6f"

      - name: Move inline hydration to module scope
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('merger/repoground/core/merge.py')
          text = path.read_text(encoding='utf-8')

          function_anchor = 'def _compute_git_blob_sha1('
          if text.count(function_anchor) != 1:
              raise SystemExit('unexpected module helper anchor')
          helper = (
              'def _attach_inline_chunk_content(chunk, content_bytes: bytes) -> None:\n'
              '    """Attach exact redacted bytes when no canonical artifact can hydrate them."""\n'
              '    if "canonical_range" in chunk:\n'
              '        return\n'
              '\n'
              '    inline_bytes = content_bytes[chunk["start_byte"]:chunk["end_byte"]]\n'
              '    inline_sha256 = hashlib.sha256(inline_bytes).hexdigest()\n'
              '    if inline_sha256 != chunk["sha256"]:\n'
              '        raise RuntimeError(\n'
              '            f"Inline chunk hash mismatch for {chunk[\'chunk_id\']}: "\n'
              '            f"expected {chunk[\'sha256\']}, got {inline_sha256}"\n'
              '        )\n'
              '    try:\n'
              '        chunk["content"] = inline_bytes.decode("utf-8")\n'
              '    except UnicodeDecodeError as exc:\n'
              '        raise RuntimeError(\n'
              '            f"Inline chunk is not valid UTF-8 for {chunk[\'chunk_id\']}"\n'
              '        ) from exc\n'
              '\n'
              '\n'
          )
          text = text.replace(function_anchor, helper + function_anchor, 1)

          old = (
              '                # Retrieval-only and noncanonical split chunks have no canonical\n'
              '                # artifact from which SQLite can hydrate text. Store only those\n'
              '                # exact, already-redacted bytes inline; canonical range-backed\n'
              '                # chunks stay compact and preserve the existing authority model.\n'
              '                if "canonical_range" not in d:\n'
              '                    inline_bytes = content_bytes[d["start_byte"]:d["end_byte"]]\n'
              '                    inline_sha256 = hashlib.sha256(inline_bytes).hexdigest()\n'
              '                    if inline_sha256 != d["sha256"]:\n'
              '                        raise RuntimeError(\n'
              '                            f"Inline chunk hash mismatch for {d[\'chunk_id\']}: "\n'
              '                            f"expected {d[\'sha256\']}, got {inline_sha256}"\n'
              '                        )\n'
              '                    try:\n'
              '                        d["content"] = inline_bytes.decode("utf-8")\n'
              '                    except UnicodeDecodeError as exc:\n'
              '                        raise RuntimeError(\n'
              '                            f"Inline chunk is not valid UTF-8 for {d[\'chunk_id\']}"\n'
              '                        ) from exc\n'
          )
          new = (
              '                # Retrieval-only and noncanonical split chunks must carry\n'
              '                # their exact redacted text because no canonical artifact exists.\n'
              '                _attach_inline_chunk_content(d, content_bytes)\n'
          )
          if text.count(old) != 1:
              raise SystemExit('unexpected inline hydration block')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install locked dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Prove behavior and complexity ratchet
        run: |
          python -m pytest -q \
            merger/repoground/tests/test_runtime_contract_regressions.py \
            merger/repoground/tests/test_retrieval_index.py \
            merger/repoground/tests/test_chunk_index_dual_ranges.py
          python scripts/ci/check_graph_maintainability.py
          git diff --check

      - name: Commit module-level refactor only
        shell: bash
        run: |
          set -euo pipefail
          git add merger/repoground/core/merge.py
          test "$(git diff --cached --name-only)" = "merger/repoground/core/merge.py"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor(retrieval): isolate inline chunk hydration"
          git push origin HEAD:fix/repoground-runtime-contracts-t006
