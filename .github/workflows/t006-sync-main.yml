name: T006 sync exact main

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact T006 branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: fix/repoground-runtime-contracts-t006
          fetch-depth: 0

      - name: Merge exact current main
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "93aa3b6446688ada71e295252cbdab21533b7599"
          test "$(git diff --name-only 93aa3b6446688ada71e295252cbdab21533b7599..HEAD)" = ".github/workflows/t006-sync-main.yml"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "9bca73f70021f941feb22883d0020f963530ff29"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-ff --no-edit origin/main
          git diff --check 93aa3b6446688ada71e295252cbdab21533b7599..HEAD

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install locked test dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Prove T006 against synchronized main
        run: |
          python -m pytest -q \
            merger/repoground/tests/test_runtime_contract_regressions.py \
            merger/repoground/tests/test_retrieval_index.py \
            merger/repoground/tests/test_chunk_index_dual_ranges.py
          python scripts/ci/check_graph_maintainability.py
          git diff --check

      - name: Push synchronized branch
        run: git push origin HEAD:fix/repoground-runtime-contracts-t006
