name: G3 Hardening Once

on:
  push:
    branches: [feat/graph-bundle-source-production]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/graph-bundle-source-production
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply hardening
        run: python3 scripts/harden_graph_bundle_sources_once.py
      - name: Install dependencies
        run: |
          pip install -r merger/lenskit/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run focused tests
        run: |
          set -o pipefail
          python -m pytest -q \
            merger/lenskit/tests/test_graph_bundle_sources.py \
            merger/lenskit/tests/test_graph_bundle_integration.py \
            merger/lenskit/tests/test_graph_bundle_manifest_provenance.py \
            merger/lenskit/tests/test_graph_index.py \
            merger/lenskit/tests/test_graph_e2e.py \
            2>&1 | tee g3-hardening-tests.log
      - name: Upload failing diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: g3-hardening-diagnostics
          path: g3-hardening-tests.log
          retention-days: 1
      - name: Ruff and structural checks
        run: |
          ruff check \
            merger/lenskit/architecture/bundle_sources.py \
            merger/lenskit/core/merge.py \
            merger/lenskit/tests/test_graph_bundle_sources.py \
            merger/lenskit/tests/test_graph_bundle_integration.py \
            merger/lenskit/tests/test_graph_bundle_manifest_provenance.py
          python3 -m json.tool merger/lenskit/contracts/bundle-manifest.v1.schema.json >/dev/null
          python3 -m json.tool docs/tasks/index.json >/dev/null
          git diff --check
      - name: Commit verified hardening
        run: |
          rm scripts/harden_graph_bundle_sources_once.py
          rm -f g3-hardening-tests.log
          git config user.name lenskit-g3-hardener
          git config user.email lenskit-g3-hardener@users.noreply.github.com
          git add merger docs scripts
          git commit -m "fix(graph): bind source production to retrieval surface"
          git push origin HEAD:feat/graph-bundle-source-production
