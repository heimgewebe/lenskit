name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==0.15.13"

      # Scope is pinned in ruff.toml: F401/F811 only, fixtures excluded.
      # Wider default Ruff findings remain outside the gate until a later ratchet.
      - name: Check pinned Ruff scope
        run: ruff check .
