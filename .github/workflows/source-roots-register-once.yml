name: Source Roots Register Once

"on":
  push:
    branches: [graph-source-roots-v1]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: graph-source-roots-v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate registration
        run: |
          python3 scripts/register_source_roots_contract.py
          python3 -m json.tool docs/tasks/index.json >/dev/null
          git diff --check
      - name: Apply generated files and remove helpers
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'graph-source-roots-v1';
            for (const path of ['docs/tasks/board.md', 'docs/tasks/index.json']) {
              const current = await github.rest.repos.getContent({owner, repo, path, ref: branch});
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch,
                sha: current.data.sha,
                message: 'docs(tasks): register source roots contract',
                content: fs.readFileSync(path).toString('base64'),
              });
            }
            for (const path of ['scripts/register_source_roots_contract.py', '.github/workflows/source-roots-register-once.yml']) {
              const current = await github.rest.repos.getContent({owner, repo, path, ref: branch});
              await github.rest.repos.deleteFile({
                owner, repo, path, branch,
                sha: current.data.sha,
                message: 'chore: remove completed source roots helper',
              });
            }
