name: G4a Registration Preview

"on":
  push:
    branches: [feat/graph-resolution-v1]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate registration
        run: |
          python3 scripts/register_g4a_once.py
          python3 -m json.tool docs/tasks/index.json >/dev/null
          git diff --check
      - name: Upload generated task files
        uses: actions/upload-artifact@v4
        with:
          name: g4a-task-registration
          path: |
            docs/tasks/board.md
            docs/tasks/index.json
          retention-days: 1
