name: T006 final tested product commit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  commit-product:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout isolated branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: fix/repoground-runtime-contracts-t006
          fetch-depth: 0

      - name: Verify helper-only branch state
        shell: bash
        run: |
          set -euo pipefail
          BASE=a33400f7090c368838bcdf02bcf2087c719fae84
          git merge-base --is-ancestor "$BASE" HEAD
          unexpected=$(git diff --name-only "$BASE"..HEAD | grep -vE '^\.github/workflows/t006-[a-z-]+\.yml$' || true)
          test -z "$unexpected"
          test "$(git hash-object .github/workflows/t006-bootstrap.yml)" = "159431cf7ca645438cecfec8bb2d9be8dcf2d7cd"

      - name: Apply embedded patch blocks
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import subprocess
          import tempfile

          lines = Path('.github/workflows/t006-bootstrap.yml').read_text(encoding='utf-8').splitlines()
          targets = (
              'Patch retrieval content contract',
              'Replace launcher with version-bound health probe',
              'Add focused regression tests',
          )

          def extract(name: str) -> str:
              start = next(i for i, line in enumerate(lines) if line.strip() == f'- name: {name}')
              run_index = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'run: |')
              block: list[str] = []
              for line in lines[run_index + 1:]:
                  if line.startswith('      - name:'):
                      break
                  if line.startswith('          '):
                      block.append(line[10:])
                  elif not line.strip():
                      block.append('')
                  else:
                      raise SystemExit(f'unexpected indentation in {name!r}')
              if not block:
                  raise SystemExit(f'empty embedded block for {name!r}')
              return '\n'.join(block) + '\n'

          for target in targets:
              with tempfile.NamedTemporaryFile('w', encoding='utf-8', suffix='.sh') as handle:
                  handle.write(extract(target))
                  handle.flush()
                  subprocess.run(['bash', handle.name], check=True)
          PY

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install locked dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Prove focused contracts
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q \
            merger/repoground/tests/test_runtime_contract_regressions.py \
            merger/repoground/tests/test_retrieval_index.py \
            merger/repoground/tests/test_chunk_index_dual_ranges.py
          python -m ruff check merger/repoground/tests/test_runtime_contract_regressions.py
          git diff --check

      - name: Commit only reviewed product paths
        shell: bash
        run: |
          set -euo pipefail
          git add \
            merger/repoground/core/merge.py \
            merger/repoground/tests/test_runtime_contract_regressions.py \
            scripts/repoground-launcher.sh
          expected=$(printf '%s\n' \
            merger/repoground/core/merge.py \
            merger/repoground/tests/test_runtime_contract_regressions.py \
            scripts/repoground-launcher.sh | sort)
          staged=$(git diff --cached --name-only | sort)
          test "$staged" = "$expected"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(runtime): bind health and retrieval content contracts"
          git push origin HEAD:fix/repoground-runtime-contracts-t006
