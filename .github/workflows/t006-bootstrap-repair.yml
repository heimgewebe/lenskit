name: Repair T006 bootstrap gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout isolated T006 branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: fix/repoground-runtime-contracts-t006
          fetch-depth: 0

      - name: Narrow baseline lint and prepare user-trigger marker
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/t006-bootstrap.yml')
          text = path.read_text(encoding='utf-8')

          old = '          test "$(git diff --name-only "$BASE"..HEAD)" = ".github/workflows/t006-bootstrap.yml"\n'
          new = (
              '          actual=$(git diff --name-only "$BASE"..HEAD | sort)\n'
              '          expected=$(printf \'%s\\n\' .github/t006-trigger .github/workflows/t006-bootstrap.yml | sort)\n'
              '          test "$actual" = "$expected"\n'
          )
          if text.count(old) != 1:
              raise SystemExit('unexpected baseline-diff guard')
          text = text.replace(old, new, 1)

          old = '          python -m ruff check merger/repoground/core/merge.py merger/repoground/tests/test_runtime_contract_regressions.py 2>&1 | tee t006-ruff.log\n'
          new = '          python -m ruff check merger/repoground/tests/test_runtime_contract_regressions.py 2>&1 | tee t006-ruff.log\n'
          if text.count(old) != 1:
              raise SystemExit('unexpected focused Ruff command')
          text = text.replace(old, new, 1)

          old = '        run: rm .github/workflows/t006-bootstrap.yml\n'
          new = '        run: rm .github/workflows/t006-bootstrap.yml .github/t006-trigger\n'
          if text.count(old) != 1:
              raise SystemExit('unexpected bootstrap cleanup command')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
          rm .github/workflows/t006-bootstrap-repair.yml
          git diff --check

      - name: Commit repaired one-shot gate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(ci): narrow T006 bootstrap lint gate"
          git push origin HEAD:fix/repoground-runtime-contracts-t006
