name: audit-hardening-diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repobrief-dev.lock.txt

      - name: Capture exact diagnostics
        run: |
          mkdir -p diagnostics
          set +e
          ruff check --config ruff-ci.toml . > diagnostics/ruff.txt 2>&1
          printf '%s\n' "$?" > diagnostics/ruff.exit
          pytest -q -m "not browser and not doc_freshness_live" > diagnostics/pytest.txt 2>&1
          printf '%s\n' "$?" > diagnostics/pytest.exit
          set -e

      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: audit-hardening-diagnostics-${{ github.run_id }}
          path: diagnostics
          if-no-files-found: error
          retention-days: 1
