name: Apply RBAW production runner bundle

on:
  push:
    branches:
      - feat/rbaw-production-systemd-runner-v1

permissions:
  contents: write

concurrency:
  group: apply-rbaw-production-runner-v1
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          ref: feat/rbaw-production-systemd-runner-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Verify branch and transfer set
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = feat/rbaw-production-systemd-runner-v1
          git merge-base --is-ancestor 24eee84dd845fcf5f3a4a82c9e42e64428e76d6d HEAD
          test "$(find .rbaw-transfer -maxdepth 1 -type f -name 'chunk-*' | sort | wc -l)" -eq 4
          test -f .rbaw-transfer/chunk-00
          test -f .rbaw-transfer/chunk-01
          test -f .rbaw-transfer/chunk-02
          test -f .rbaw-transfer/chunk-03

      - name: Reconstruct and verify bundle
        run: |
          set -euo pipefail
          cat .rbaw-transfer/chunk-00 .rbaw-transfer/chunk-01 .rbaw-transfer/chunk-02 .rbaw-transfer/chunk-03 \
            | base64 --decode > /tmp/rbaw-production-runner.tar.gz
          printf '%s  %s\n' b32a3e5f07527a47efa8f42d6ed8e35b1d022d640448649b46cdfdcb4520ace0 /tmp/rbaw-production-runner.tar.gz \
            | sha256sum --check --strict
          mapfile -t members < <(tar --list --gzip --file /tmp/rbaw-production-runner.tar.gz | sort)
          expected=(
            docs/architecture/rbaw-production-sandbox-v1.md
            docs/contracts/patch-evaluation-runner-receipt-v1.md
            docs/proofs/rbaw-production-sandbox-v1-proof.md
            merger/repoground/contracts/examples/patch-evaluation-runner-receipt.v1.json
            merger/repoground/contracts/patch-evaluation-runner-receipt.v1.schema.json
            tests/test_patch_evaluation_systemd_runner.py
            tools/patch_evaluation_systemd_runner.py
          )
          test "${#members[@]}" -eq "${#expected[@]}"
          diff -u <(printf '%s\n' "${expected[@]}" | sort) <(printf '%s\n' "${members[@]}")
          tar --extract --gzip --file /tmp/rbaw-production-runner.tar.gz --directory .
          rm -rf .rbaw-transfer
          rm .github/workflows/apply-rbaw-production-runner.yml

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Install pinned test dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Validate exact slice
        run: |
          set -euo pipefail
          python -m py_compile tools/patch_evaluation_systemd_runner.py tests/test_patch_evaluation_systemd_runner.py
          python -m json.tool merger/repoground/contracts/patch-evaluation-runner-receipt.v1.schema.json >/dev/null
          python -m json.tool merger/repoground/contracts/examples/patch-evaluation-runner-receipt.v1.json >/dev/null
          pytest -q tests/test_patch_evaluation_systemd_runner.py
          git diff --check
          mapfile -t changed < <(git status --short | sed 's/^...//' | sort)
          expected=(
            .github/workflows/apply-rbaw-production-runner.yml
            .rbaw-transfer/
            docs/architecture/rbaw-production-sandbox-v1.md
            docs/contracts/patch-evaluation-runner-receipt-v1.md
            docs/proofs/rbaw-production-sandbox-v1-proof.md
            merger/repoground/contracts/examples/patch-evaluation-runner-receipt.v1.json
            merger/repoground/contracts/patch-evaluation-runner-receipt.v1.schema.json
            tests/test_patch_evaluation_systemd_runner.py
            tools/patch_evaluation_systemd_runner.py
          )
          diff -u <(printf '%s\n' "${expected[@]}" | sort) <(printf '%s\n' "${changed[@]}")

      - name: Commit final slice and remove transfer path
        run: |
          set -euo pipefail
          git config user.name grabowski-operator
          git config user.email grabowski-operator@users.noreply.github.com
          git add -A
          test "$(git diff --cached --name-only | wc -l)" -eq 13
          git commit -m 'feat: add systemd cgroup production runner'
          git push origin HEAD:feat/rbaw-production-systemd-runner-v1
