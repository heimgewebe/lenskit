name: RepoBrief self-review hash

on:
  push:
    branches:
      - feat/rpu-v1-t015-agent-memory-citations
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  hash:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute implementation diff hash
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          git diff origin/main...HEAD -- . \
            ':(exclude)docs/proofs/repobrief-agent-memory-citations-v1.self-review.md' \
            ':(exclude).github/workflows/repobrief-self-review-hash.yml' \
            ':(exclude).github/workflows/lint.yml' \
            > /tmp/repobrief-implementation.diff
          hash="$(sha256sum /tmp/repobrief-implementation.diff | awk '{print $1}')"
          bytes="$(wc -c < /tmp/repobrief-implementation.diff)"
          printf 'IMPLEMENTATION_HEAD=%s\nIMPLEMENTATION_DIFF_SHA256=%s\nIMPLEMENTATION_DIFF_BYTES=%s\n' \
            "${GITHUB_SHA}" "${hash}" "${bytes}" \
            | tee /tmp/repobrief-self-review-hash.txt
      - name: Upload self-review hash
        uses: actions/upload-artifact@v4
        with:
          name: repobrief-self-review-hash
          path: /tmp/repobrief-self-review-hash.txt
          if-no-files-found: error
          retention-days: 1
